{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "day5-ecommerce.name" . }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{ include "day5-ecommerce.labels" . | nindent 4 }}
  annotations:
    {{ toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.payments.name }}-service
                port:
                  number: {{ .Values.service.port }}
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.orders.name }}-service
                port:
                  number: {{ .Values.service.port }}
{{- end }}

