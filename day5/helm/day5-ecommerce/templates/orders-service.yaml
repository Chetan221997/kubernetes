apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.orders.name }}-service
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.orders.name }}
    {{ include "day5-ecommerce.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.orders.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http

